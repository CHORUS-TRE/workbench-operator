kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workspaces.default.chorus-tre.ch
spec:
  group: default.chorus-tre.ch
  names:
    kind: Workspace
    listKind: WorkspaceList
    plural: workspaces
    singular: workspace
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.networkPolicy
      name: Network-Policy
      type: string
    - jsonPath: .status.conditions[?(@.type=="NetworkPolicyReady")].ready
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="NetworkPolicyReady")].reason
      name: Reason
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Workspace is the Schema for the workspaces API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkspaceSpec defines the desired state of Workspace
            properties:
              airgapped:
                description: Airgapped indicates whether this workspace operates in
                  an airgapped environment
                type: boolean
              allowedFQDNs:
                description: |-
                  AllowedFQDNs is a list of fully qualified domain names that are permitted in this workspace.
                  Only used when Airgapped is true. Each entry can be an exact domain (e.g. example.com)
                  or a wildcard pattern (e.g. *.corp.internal).

                  Note: wildcards are opt-in. Specifying "example.com" does not implicitly allow "*.example.com".
                  Note: entries must contain at least one dot (two labels), e.g. "example.com".
                  Note: each entry produces one Cilium FQDN selector. To allow both apex and subdomains,
                  add both "example.com" and "*.example.com" as separate entries (counts toward MaxItems).
                items:
                  maxLength: 253
                  type: string
                maxItems: 64
                type: array
                x-kubernetes-list-type: set
            required:
            - airgapped
            type: object
          status:
            description: WorkspaceStatus defines the observed state of Workspace
            properties:
              conditions:
                description: Conditions holds the network policy condition for this
                  workspace.
                items:
                  description: |-
                    NetworkPolicyCondition represents the observed state of the network policy
                    for a workspace. It uses a custom "ready" field instead of the standard
                    metav1.Condition "status" field so that kubectl table columns and YAML field
                    names are consistent.
                  properties:
                    lastTransitionTime:
                      description: LastTransitionTime is the last time the ready field
                        changed.
                      format: date-time
                      type: string
                    message:
