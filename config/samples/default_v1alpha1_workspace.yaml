apiVersion: default.chorus-tre.ch/v1alpha1
kind: Workspace
metadata:
  labels:
    app.kubernetes.io/name: workbench-operator
    app.kubernetes.io/managed-by: kustomize
  name: workspace
  namespace: workspace
spec:
  # networkPolicy: Open          # all external internet traffic allowed (ports 80/443)
  # networkPolicy: FQDNAllowlist # only the FQDNs listed in allowedFQDNs are reachable
  networkPolicy: Airgapped       # all external traffic blocked
  # allowedFQDNs:                # only used when networkPolicy: FQDNAllowlist
  #   - chorus-tre.ch
  #   - "*.chorus-tre.ch"
  services:
    postgres:
      state: Running
      chart:
        repository: services/postgres
        tag: "1.6.1"
      credentials:
        secretName: postgres-creds
        paths:
          - settings.superuserPassword.value
      values:
        settings:
          superuser:
            value: postgres
        storage:
          requestedSize: 1Gi
      connectionInfoTemplate: "postgresql://postgres@{{.ReleaseName}}.{{.Namespace}}:5432/postgres"
