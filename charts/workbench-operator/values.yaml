
# Platform-internal services always reachable from workspace pods in all network modes.
# Each entry must correspond to an HTTPRoute hostname in the cluster.
# Access is restricted to only the listed FQDNs via Cilium native serverNames SNI filtering,
# blocking other URLs served by the same gateway or ingress controller.
# globalInternalServices:
# - fqdn: gitlab.internal.chorus-tre.local
#   ports: ["443", "22"]
# - fqdn: i2b2.internal.chorus-tre.local
#   ports: ["443"]
globalInternalServices: []

# Network policy namespace configuration.
networkPolicy:
  # Namespaces whose pods may initiate connections INTO workspace pods (e.g. backend, prometheus).
  allowedIngressNamespaces:
    - backend
    - prometheus
  # Namespaces that workspace pods may connect OUT TO (post-DNAT destinations).
  # envoy-gateway-system: internal services on Envoy Gateway (gitlab, i2b2).
  # ingress-nginx: keycloak, which stays on nginx (open to all browsers for OAuth).
  # The serverNames SNI filter in the CNP ensures only the listed FQDNs are reachable
  # in each namespace — frontend and backend on nginx remain blocked.
  allowedEgressNamespaces:
    - envoy-gateway-system
    - ingress-nginx
  # Subset of allowedEgressNamespaces that run Envoy Gateway.
  # Envoy Gateway internally remaps privileged ports (e.g. 443 → 10443).
  # Namespaces listed here get the remapped port in their CNP rule.
  envoyGatewayNamespaces:
    - envoy-gateway-system
  # Restrict workspace egress to only the named Envoy Gateway's pods.
  # Uses the gateway.envoyproxy.io/owning-gateway-name label.
  # When set, workspace pods can only reach this gateway, not other gateways
  # in the same namespace (e.g. chorus-external-gateway).
  # Empty = all Envoy pods in the namespace (backwards compatible).
  envoyGatewayName: "chorus-internal-gateway"

# Storage configuration
storage:
  # pvcLabels is an optional map of labels to add to every PVC created by the operator.
  pvcLabels:
    velero.io/exclude-from-backup: "true"

# JuiceFS configuration
juicefs:
  secretName: juicefs-secret
  secretNamespace: kube-system

# NFS configuration
nfs:
  secretName: nfs-secret
  secretNamespace: kube-system

workbench:
  priorityClassName: low-priority
  # Default resource requirements for the xpra server container.
  # When empty, no resources are set. Can be overridden per-workbench via spec.server.resources.
  # serverResources:
  #   limits:
  #     cpu: 1000m
  #     memory: 512Mi
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi
  serverResources: {}

application:
  priorityClassName: preemptible

controllerManager:
  priorityClassName: high-priority
  manager:
    args:
    - --metrics-bind-address=:8080
    - --leader-elect
    - --health-probe-bind-address=:8081
    - --registry=harbor.build.chorus-tre.local
    - --apps-repository=apps
    - --services-repository=services
    - --xpra-server-image=harbor.build.chorus-tre.local/apps/xpra-server
    - --init-container-image=harbor.build.chorus-tre.local/apps/app-init
    - --socat-image=alpine/socat:1.8.0.0
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
    image:
      repository: harbor.build.chorus-tre.local/chorus/workbench-operator
      tag: 0.4.57
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  podSecurityContext:
    runAsNonRoot: true
  replicas: 1
  serviceAccount:
    annotations: {}
imagePullSecrets: []
kubernetesClusterDomain: cluster.local
# Name of an externally-managed Secret holding license configuration and values.
# The Secret must be created in the workbench namespace (not managed by this chart).
# Set to empty string to disable license injection.
licenseSecretName: ""

serviceMonitor:
  enabled: true
metricsService:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  type: ClusterIP
