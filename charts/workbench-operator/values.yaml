
# Platform-internal services always reachable from workspace pods in all network modes.
# Each entry must correspond to an Ingress host in the declared namespace.
# Because all internal services share the same ingress controller, access is restricted to
# only the listed FQDNs via Cilium L7 TLS SNI inspection, blocking other URLs served by
# the same ingress controller.
# globalInternalServices:
# - namespace: gitlab
#   fqdn: gitlab.local.chorus-tre.ch
#   ports: ["443"]
# - namespace: i2b2
#   fqdn: i2b2.local.chorus-tre.ch
#   ports: ["443"]
globalInternalServices: []

# Network policy namespace configuration.
networkPolicy:
  # Namespaces whose pods may initiate connections INTO workspace pods (e.g. backend, prometheus).
  allowedIngressNamespaces:
    - backend
    - prometheus
  # Namespaces that workspace pods may connect OUT TO.
  # ingress-nginx is required because Cilium performs service DNAT before the policy check:
  # traffic to internal service FQDNs is load-balanced to ingress-nginx controller pod IPs before
  # evaluation, so toEndpoints for the ingress-nginx namespace is needed to match the post-DNAT destination.
  allowedEgressNamespaces:
    - ingress-nginx

# Storage configuration
storage:
  # pvcLabels is an optional map of labels to add to every PVC created by the operator.
  pvcLabels:
    velero.io/exclude-from-backup: "true"

# JuiceFS configuration
juicefs:
  secretName: juicefs-secret
  secretNamespace: kube-system

# NFS configuration
nfs:
  secretName: nfs-secret
  secretNamespace: kube-system

workbench:
  priorityClassName: low-priority
  # Default resource requirements for the xpra server container.
  # When empty, no resources are set. Can be overridden per-workbench via spec.server.resources.
  # serverResources:
  #   limits:
  #     cpu: 1000m
  #     memory: 512Mi
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi
  serverResources: {}

application:
  priorityClassName: preemptible

controllerManager:
  priorityClassName: high-priority
  manager:
    args:
    - --metrics-bind-address=:8080
    - --leader-elect
    - --health-probe-bind-address=:8081
    - --registry=harbor.build.chorus-tre.local
    - --apps-repository=apps
    - --services-repository=services
    - --xpra-server-image=harbor.build.chorus-tre.local/apps/xpra-server
    - --init-container-image=harbor.build.chorus-tre.local/apps/app-init
    - --socat-image=alpine/socat:1.8.0.0
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
    image:
      repository: harbor.build.chorus-tre.local/chorus/workbench-operator
      tag: 0.4.50
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  podSecurityContext:
    runAsNonRoot: true
  replicas: 1
  serviceAccount:
    annotations: {}
imagePullSecrets: []
kubernetesClusterDomain: cluster.local
# Name of an externally-managed Secret holding license configuration and values.
# The Secret must be created in the workbench namespace (not managed by this chart).
# Set to empty string to disable license injection.
licenseSecretName: ""

serviceMonitor:
  enabled: true
metricsService:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  type: ClusterIP
